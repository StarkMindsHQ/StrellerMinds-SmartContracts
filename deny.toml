# cargo-deny configuration
# See: https://embarkstudios.github.io/cargo-deny/

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "deny"
unsound = "deny"
yanked = "deny"
severity-threshold = "medium"
ignore = [
    "RUSTSEC-2024-0388",
    "RUSTSEC-2024-0436",
    "RUSTSEC-2025-0057",
    "RUSTSEC-2025-0119",
    "RUSTSEC-2025-0134",
    "RUSTSEC-2026-0073", # Parsing error for CVSS 4.0 in current tool version
]

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "CC0-1.0",
]
deny = ["GPL-2.0", "GPL-3.0", "AGPL-3.0", "LGPL-2.0", "LGPL-3.0"]
copyleft = "deny"
allow-osi-fsf-free = "neither"
default = "deny"
confidence-threshold = 0.8

[bans]
# Deny multiple versions of the same crate to keep the dependency tree clean
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

# Crates that must never be included
deny = [
    { name = "openssl", reason = "Use rustls instead for WASM compatibility" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
