name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
            ${{ runner.os }}-cargo-
      
      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings -D nonstandard-style

  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-
            ${{ runner.os }}-cargo-
      
      - name: Build release version
        run: cargo build --workspace --release --verbose
      
      - name: Check binary sizes
        run: |
          find target/release -name "streller-cli" -exec ls -lh {} \; || true
          find target/release -name "*.wasm" -exec ls -lh {} \; || true

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
            ${{ runner.os }}-cargo-
      
      - name: Run unit tests
        run: cargo test --workspace --exclude e2e-tests --verbose

  performance:
    name: Performance Regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Run performance profile
        run: ./scripts/perf_profile.sh --report target/perf_report.json

      - name: Upload performance report
        uses: actions/upload-artifact@v4
        with:
          name: perf-report
          path: target/perf_report.json

  cors-integration:
    name: CORS Integration Check
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'cors_config') || contains(github.event.head_commit.modified, 'enhanced_verification') || contains(github.event.head_commit.modified, 'cross-chain-credentials')
    steps:
      - uses: actions/checkout@v4
      
      - name: Trigger CORS integration tests
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: cors-integration-trigger
          client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}'

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [format, clippy, build, test, performance, cors-integration]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          cors_result="success"
          if [[ "${{ needs.cors-integration.result }}" == "skipped" ]]; then
            echo "CORS integration tests skipped (no CORS-related changes)"
          elif [[ "${{ needs.cors-integration.result }}" != "success" ]]; then
            cors_result="failed"
            echo "CORS Integration: ${{ needs.cors-integration.result }}"
          else
            echo "CORS Integration: ${{ needs.cors-integration.result }}"
          fi
          
          if [[ "${{ needs.format.result }}" != "success" || \
                "${{ needs.clippy.result }}" != "success" || \
                "${{ needs.build.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" || \
                "${{ needs.performance.result }}" != "success" || \
                "$cors_result" == "failed" ]]; then
            echo "❌ One or more CI jobs failed"
            echo "Format: ${{ needs.format.result }}"
            echo "Clippy: ${{ needs.clippy.result }}"
            echo "Build: ${{ needs.build.result }}"
            echo "Test: ${{ needs.test.result }}"
            echo "Performance: ${{ needs.performance.result }}"
            echo "CORS Integration: $cors_result"
            exit 1
          fi
          echo "✅ All CI jobs passed successfully"
          echo "🎉 Project is ready for deployment!"
