name: Release Test

on:
  push:
    branches: [develop]
    paths:
      - 'contracts/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

env:
  CARGO_TERM_COLOR: always

jobs:
  release-test:
    name: Release Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Soroban CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config
          cargo install --locked soroban-cli --version 21.5.0 --force
          soroban --version
          stellar --version

      - name: Install Binaryen (wasm-opt)
        run: |
          sudo apt-get update
          sudo apt-get install -y binaryen

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Run prerequisites test
        run: ./scripts/release-test.sh build
        shell: bash

      - name: Run code quality checks
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings

      - name: Run unit tests
        run: cargo test --workspace --exclude e2e-tests --lib

      - name: Build all contracts
        run: ./scripts/build.sh
        shell: bash

      - name: Run performance profile
        run: ./scripts/perf_profile.sh --report target/perf_report.json
        shell: bash

      - name: Run security audit
        run: |
          cargo install cargo-audit
          cargo audit || echo "Warning: Security audit found issues"

      - name: Check WASM sizes
        run: |
          for file in target/wasm32-unknown-unknown/release/*.wasm; do
            size=$(stat -c%s "$file")
            if [ "$size" -gt 500000 ]; then
              echo "Warning: Large WASM file: $(basename $file) - $size bytes"
            fi
          done

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-test-results
          path: |
            logs/*.log
            target/perf_report.json
            target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 7
