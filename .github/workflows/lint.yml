name: Lint and Quality Checks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Fast checks that run first to provide quick feedback
  quick-checks:
    name: Quick Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy (basic)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # Basic security and dependency checks
  security-checks:
    name: Security & Dependency Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
            ${{ runner.os }}-cargo-

      - name: Run cargo-deny checks (if available)
        run: |
          if command -v cargo-deny &> /dev/null; then
            cargo deny check
          else
            echo "cargo-deny not available, skipping deny checks"
          fi

      - name: Check for unused dependencies (if available)
        run: |
          if command -v cargo-machete &> /dev/null; then
            cargo machete
          else
            echo "cargo-machete not available, skipping unused dependency checks"
          fi

  # Documentation checks
  docs-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-docs-
            ${{ runner.os }}-cargo-

      - name: Generate documentation
        run: cargo doc --workspace --no-deps --document-private-items

      - name: Check documentation coverage
        run: |
          # Check if documentation was generated successfully
          if [ ! -d "target/doc" ]; then
            echo "Documentation generation failed"
            exit 1
          fi
          echo "Documentation generated successfully"

  # Comprehensive linting
  comprehensive-lint:
    name: Comprehensive Linting
    runs-on: ubuntu-latest
    needs: [quick-checks, security-checks]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-comprehensive-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-comprehensive-
            ${{ runner.os }}-cargo-

      - name: Run basic linting script
        run: |
          if [ -f "scripts/lint.sh" ]; then
            chmod +x scripts/lint.sh
            ./scripts/lint.sh --fast || true
          else
            echo "Lint script not found, running basic checks"
            cargo fmt --all -- --check
            cargo clippy --workspace --all-targets --all-features -- -D warnings
          fi

  # Test coverage
  test-coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --workspace --all-features

  # Performance and size checks
  performance-check:
    name: Performance & Size Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-perf-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-perf-
            ${{ runner.os }}-cargo-

      - name: Build release version
        run: cargo build --workspace --release

      - name: Check binary sizes
        run: |
          echo "Binary size analysis:"
          find target/release -name "*.wasm" -exec ls -lh {} \; || true
          find target/release -name "streller-cli" -exec ls -lh {} \; || true

      - name: Check for duplicate dependencies
        run: cargo tree --duplicates

  # Final status check
  status-check:
    name: Status Check
    runs-on: ubuntu-latest
    needs: [quick-checks, security-checks, docs-check, comprehensive-lint, test-coverage, performance-check]
    if: always()
    steps:
      - name: Check workflow status
        run: |
          if [[ "${{ needs.quick-checks.result }}" == "success" && 
                "${{ needs.security-checks.result }}" == "success" && 
                "${{ needs.docs-check.result }}" == "success" && 
                "${{ needs.comprehensive-lint.result }}" == "success" && 
                "${{ needs.test-coverage.result }}" == "success" && 
                "${{ needs.performance-check.result }}" == "success" ]]; then
            echo "✅ All quality checks passed!"
            exit 0
          else
            echo "❌ Some quality checks failed"
            echo "Quick Checks: ${{ needs.quick-checks.result }}"
            echo "Security Checks: ${{ needs.security-checks.result }}"
            echo "Docs Check: ${{ needs.docs-check.result }}"
            echo "Comprehensive Lint: ${{ needs.comprehensive-lint.result }}"
            echo "Test Coverage: ${{ needs.test-coverage.result }}"
            echo "Performance Check: ${{ needs.performance-check.result }}"
            exit 1
          fi
