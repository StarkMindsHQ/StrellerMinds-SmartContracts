name: Backup

on:
  schedule:
    - cron: '0 2 * * *'   # daily at 02:00 UTC
  workflow_dispatch:
    inputs:
      verify_only:
        description: 'Run verification only (no new backup)'
        type: boolean
        default: false

jobs:
  backup:
    runs-on: ubuntu-latest
    if: ${{ !inputs.verify_only }}
    steps:
      - uses: actions/checkout@v6

      - name: Run backup
        id: backup
        run: |
          chmod +x scripts/backup.sh
          BACKUP_DIR=$(./scripts/backup.sh ./backups)
          echo "backup_dir=${BACKUP_DIR}" >> "$GITHUB_OUTPUT"

      - name: Verify backup
        run: |
          chmod +x scripts/backup_verify.sh
          ./scripts/backup_verify.sh "${{ steps.backup.outputs.backup_dir }}"

      - name: Upload backup artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.run_id }}
          path: backups/
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Backup or verification failed — check logs above"

  verify-latest:
    runs-on: ubuntu-latest
    if: ${{ inputs.verify_only }}
    steps:
      - uses: actions/checkout@v6

      - name: Download latest backup artifact
        uses: actions/download-artifact@v4
        with:
          path: backups/

      - name: Verify
        run: |
          LATEST=$(ls -td backups/*/ | head -1)
          chmod +x scripts/backup_verify.sh
          ./scripts/backup_verify.sh "$LATEST"
