name: Release Metrics

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  metrics:
    name: Collect Release Metrics
    runs-on: ubuntu-latest
    outputs:
      quality_score: ${{ steps.collect.outputs.quality_score }}
      total_releases: ${{ steps.collect.outputs.total_releases }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install GitHub CLI
        run: |
          gh --version || (curl -fsSL https://github.com/github/hub/raw/master/script/get | bash -s 2.14.1)

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Build contracts
        run: ./scripts/build.sh
        shell: bash

      - name: Collect metrics
        id: collect
        run: |
          ./scripts/release-monitor.sh 2>&1 | tee metrics_output.log
          
          # Extract key metrics
          TOTAL_RELEASES=$(grep "Total Releases:" metrics_output.log | awk '{print $3}' || echo "0")
          echo "total_releases=$TOTAL_RELEASES" >> $GITHUB_OUTPUT
          
          QUALITY_SCORE=$(grep "Quality Score:" metrics_output.log | awk -F'/' '{print $1}' | awk '{print $NF}' || echo "100")
          echo "quality_score=$QUALITY_SCORE" >> $GITHUB_OUTPUT
        shell: bash

      - name: Upload metrics report
        uses: actions/upload-artifact@v7
        with:
          name: release-metrics-report
          path: |
            metrics/*.md
            metrics_output.log
          retention-days: 30

      - name: Post metrics to issue (if exists)
        if: env.METRICS_ISSUE_NUMBER != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          METRICS_ISSUE_NUMBER: ${{ vars.METRICS_ISSUE_NUMBER }}
        run: |
          if [ -n "$METRICS_ISSUE_NUMBER" ]; then
            gh issue comment "$METRICS_ISSUE_NUMBER" --body "## Weekly Metrics Report
            
            Generated: $(date '+%Y-%m-%d %H:%M:%S')
            
            View full report in artifacts." || echo "Could not post comment"
          fi

  notify:
    name: Notify Metrics Results
    runs-on: ubuntu-latest
    needs: metrics
    if: always()
    steps:
      - name: Check metrics status
        run: |
          if [ "${{ needs.metrics.result }}" == "success" ]; then
            echo "✅ Metrics collection successful"
          elif [ "${{ needs.metrics.result }}" == "failure" ]; then
            echo "❌ Metrics collection failed"
            exit 1
          else
            echo "⚠️ Metrics collection skipped"
          fi
