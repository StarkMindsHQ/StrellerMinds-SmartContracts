<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StrellerMinds Visual Baseline</title>
    <style>
      :root {
        --bg: #050816;
        --panel: #0d1226;
        --text: #e5ecff;
        --muted: #98a7c6;
        --primary: #5eead4;
        --secondary: #8b5cf6;
      }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
        background: radial-gradient(circle at 20% 20%, #10234f 0%, var(--bg) 45%);
        color: var(--text);
      }
      .container {
        max-width: 1080px;
        margin: 0 auto;
        padding: 24px;
      }
      .nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 16px;
        border: 1px solid #21305f;
        border-radius: 12px;
        background: rgba(13, 18, 38, 0.85);
        backdrop-filter: blur(8px);
      }
      .badge {
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
        border: 1px solid #2dd4bf66;
        color: var(--primary);
      }
      .hero {
        margin-top: 24px;
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 20px;
      }
      .panel {
        background: rgba(13, 18, 38, 0.88);
        border: 1px solid #21305f;
        border-radius: 14px;
        padding: 18px;
      }
      .progress {
        height: 8px;
        background: #1d2b53;
        border-radius: 999px;
        overflow: hidden;
      }
      .progress > div {
        width: 72%;
        height: 100%;
        background: linear-gradient(90deg, var(--primary), var(--secondary));
      }
      .cards {
        margin-top: 20px;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }
      .label {
        color: var(--muted);
        font-size: 13px;
      }
      h1, h2, p {
        margin: 0;
      }
      h1 {
        font-size: 32px;
      }
      h2 {
        font-size: 20px;
        margin-bottom: 10px;
      }
      .mt {
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="nav">
        <strong>StrellerMinds</strong>
        <span class="badge">Testnet</span>
      </header>

      <section class="hero">
        <article class="panel">
          <h1>Analytics Dashboard</h1>
          <p class="label mt">Track verified learning progress and credential events.</p>
          <div class="mt progress"><div></div></div>
        </article>
        <article class="panel">
          <h2>Active Learners</h2>
          <p>1,248</p>
          <p class="label mt">+12.5% this month</p>
        </article>
      </section>

      <section class="cards">
        <article class="panel">
          <h2>Completion</h2>
          <p>87%</p>
        </article>
        <article class="panel">
          <h2>Certificates</h2>
          <p>3,212</p>
        </article>
        <article class="panel">
          <h2>Engagement</h2>
          <p>92%</p>
        </article>
      </section>
    </div>
  </body>
</html>
