[advisories]
# Advisories in transitive Soroban SDK dependencies that are not directly
# reachable in this codebase. Tracked for upstream resolution.
# See docs/DEPENDENCY_POLICY.md for the process to add/remove entries here.
ignore = [
    # curve25519-dalek: timing variability — not exploitable in Soroban WASM context
    "RUSTSEC-2024-0388",
    # ed25519-dalek: double-public-key signing oracle — not used in this pattern
    "RUSTSEC-2024-0436",
    # Soroban SDK transitive deps — reviewed 2026-04-02, not reachable
    "RUSTSEC-2025-0057",
    "RUSTSEC-2025-0119",
    "RUSTSEC-2025-0134",
    # time: DoS via stack exhaustion — transitive dep via serde_with, pinned by soroban-sdk 22.0.0
    "RUSTSEC-2026-0009",
]
