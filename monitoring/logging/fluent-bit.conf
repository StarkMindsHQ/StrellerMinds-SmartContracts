[SERVICE]
    Daemon Off
    Flush 5
    Log_Level info
    Parsers_File parsers.conf
    HTTP_Server On
    HTTP_Listen 0.0.0.0
    HTTP_Port 2020

# ─────────────────────────────────────────────────────────
# Input: Collect logs from container stdout/stderr
# ─────────────────────────────────────────────────────────
[INPUT]
    Name systemd
    Tag host.*
    Path /var/log/journal
    Read_From_Tail On
    Systemd_Filter _SYSTEMD_UNIT=strellerminds.service

[INPUT]
    Name tail
    Tag api.logs
    Path /var/log/strellerminds-api/*.log
    Parser json
    DB /var/log/strellerminds-api.db
    Mem_Buf_Limit 10MB
    Skip_Long_Lines On

[INPUT]
    Name tail
    Tag contract.logs
    Path /var/log/strellerminds-contracts/*.log
    Parser json
    DB /var/log/strellerminds-contracts.db
    Mem_Buf_Limit 10MB
    Skip_Long_Lines On

# ─────────────────────────────────────────────────────────
# Filter: Enrich and transform logs
# ─────────────────────────────────────────────────────────
[FILTER]
    Name record_modifier
    Match *
    Record hostname ${HOSTNAME}
    Record environment ${ENVIRONMENT}
    Record service_version ${SERVICE_VERSION}

[FILTER]
    Name throttle
    Match *
    Rate 10000
    Window 5

# ─────────────────────────────────────────────────────────
# Output: Send to Elasticsearch/OpenSearch
# ─────────────────────────────────────────────────────────
[OUTPUT]
    Name es
    Match *
    Host ${ELASTICSEARCH_HOST:localhost}
    Port ${ELASTICSEARCH_PORT:9200}
    Index strellerminds-%Y.%m.%d
    Type _doc
    Retry_Limit 5
    Trace_Output On
    Trace_Error On

[OUTPUT]
    Name stackdriver
    Match *
    google_service_credentials /etc/credentials/gcloud-credentials.json
    project_id ${GCP_PROJECT_ID}
    resource_labels hostname=${HOSTNAME},service=strellerminds
    Retry_Limit 3
