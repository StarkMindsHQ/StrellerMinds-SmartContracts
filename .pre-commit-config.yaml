repos:
  - repo: local
    hooks:
      - id: rustfmt
        name: rustfmt (workspace)
        entry: cargo fmt --all
        language: system
        pass_filenames: false
      - id: rust-clippy-style
        name: clippy naming/style checks
        entry: cargo clippy --workspace --all-targets --all-features -- -D warnings -D nonstandard-style
        language: system
        pass_filenames: false
