site_name: StarkMinds Smart Contracts
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started:
    - Development Guide: development.md
    - Deployment Guide: DEPLOYMENT.md
  - User Guide: USER_GUIDE.md
  - API Reference:
    - Overview: API.md
    - Getting Started: api/guides/getting-started.md
    - Authentication: api/guides/authentication.md
    - OpenAPI Specs:
      - Certificate: api/openapi/certificate.yaml
      - Token: api/openapi/token.yaml
      - Assessment: api/openapi/assessment.yaml
      - Analytics: api/openapi/analytics.yaml
      - Community: api/openapi/community.yaml
      - Gamification: api/openapi/gamification.yaml
      - Marketplace: api/openapi/marketplace.yaml
      - Progress: api/openapi/progress.yaml
    - Code Examples:
      - Rust: api/guides/code-examples/rust.md
      - TypeScript: api/guides/code-examples/typescript.md
  - Architecture:
    - High-Level Architecture: ARCHITECTURE.md
    - Cross-Chain Architecture: CROSS_CHAIN_ARCHITECTURE.md
    - Cross-Chain Deployment: CROSS_CHAIN_DEPLOYMENT.md
    - Cross-Chain Implementation: CROSS_CHAIN_IMPLEMENTATION.md
  - Systems:
    - Advanced Search: ADVANCED_SEARCH_SYSTEM.md
    - Diagnostics: DIAGNOSTICS_PLATFORM.md
    - Diagnostics Integration: DIAGNOSTICS_PLATFORM_INTEGRATION_GUIDE.md
    - Mobile Optimizer: MOBILE_OPTIMIZER_SYSTEM.md
    - Multisig Certificates: MULTISIG_CERTIFICATE_SYSTEM.md
    - Prerequisite System: PREREQUISITE_SYSTEM.md
    - RBAC: RBAC_IMPLEMENTATION.md
    - Reentrancy Protection: REENTRANCY_PROTECTION.md
    - Token Rewards: TOKEN_INCENTIVE_SYSTEM.md
    - Upgrade Framework: UPGRADE_FRAMEWORK.md
  - Developer Reference:
    - Developer Onboarding: ONBOARDING.md
    - Code Style: CODE_STYLE.md
    - Contributing: contributing.md
    - Event Monitoring: event-monitoring.md
    - Build Matrix: PER_CONTRACT_BUILD_MATRIX.md
    - Metadata Update Guide: METADATA_UPDATE_GUIDE.md
    - Metadata Validation: METADATA_VALIDATION.md
  - Audits & Security:
    - Security Overview: security.md
    - Security Audit Checklist: security_audit_checklist.md
    - Security Audit Report: SECURITY_AUDIT_REPORT.md
    - Dependency Policy: DEPENDENCY_POLICY.md
    - Gas Optimization: gas-optimization.md
    - Gas Analysis: gas_optimization_analysis.md