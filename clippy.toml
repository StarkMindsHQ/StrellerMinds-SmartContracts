# Clippy configuration for StrellerMinds Smart Contracts

# Enable additional lints for better code quality
avoid-breaking-exported-api = true
avoid-ifs-together-with-else = true
allow-dbg-in-tests = true
allow-expect-in-tests = true
allow-mixed-uninlined-format-args = true
allow-unwrap-in-tests = true
allow-useless-vec-in-tests = true
cognitive-complexity-threshold = 30
msrv = "1.74.0"
too-many-arguments-threshold = 7
type-complexity-threshold = 250
uninlined-format-args = false

# Disallowed names (basic ones that are clearly bad practice)
disallowed-names = ["foo", "bar", "baz", "qux"]

# Basic configuration - removed overly strict rules that cause CI failures
